<!DOCTYPE html>
<html>
<body>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<canvas id="c256" width="256" height="256" style="display:none"></canvas>
<canvas id="c32" width="32" height="32" style="display:none"></canvas>
<button onclick="gen(512,'icon-512.png')">Скачать 512×512</button>
<button onclick="gen(256,'icon-256.png')">Скачать 256×256</button>
<button onclick="gen(32,'favicon-32.png')">Скачать 32×32 (фавикон)</button>

<script>
function draw(ctx, size) {
  const s = size;
  ctx.fillStyle = '#0a0e17';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.22);
  ctx.fill();

  ctx.strokeStyle = '#22d3ee';
  ctx.lineWidth = s * 0.04;
  ctx.beginPath();
  ctx.arc(s/2, s/2, s * 0.36, 0, Math.PI * 2);
  ctx.stroke();

  const px = s/2, py = s * 0.38, pr = s * 0.13;
  ctx.fillStyle = '#22d3ee';
  ctx.beginPath();
  ctx.arc(px, py, pr, Math.PI, 0);
  ctx.lineTo(px + pr, py);
  ctx.quadraticCurveTo(px + pr, py + pr * 1.2, px, py + pr * 2.4);
  ctx.quadraticCurveTo(px - pr, py + pr * 1.2, px - pr, py);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#0a0e17';
  ctx.beginPath();
  ctx.arc(px, py, pr * 0.4, 0, Math.PI * 2);
  ctx.fill();

  if (size >= 64) {
    ctx.fillStyle = '#22d3ee';
    ctx.font = `bold ${s * 0.11}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('RYADOM', s/2, s * 0.82);
  }
}

function gen(size, name) {
  const idMap = { 512: 'c512', 256: 'c256', 32: 'c32' };
  const canvas = document.getElementById(idMap[size]);
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, size, size);
  draw(ctx, size);
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = name;
  a.click();
}
</script>
</body>
</html>
